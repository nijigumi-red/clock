<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>デジタル時計</title>
<link href="https://fonts.googleapis.com/css2?family=BIZ+UDGothic:wght@400;700&family=BIZ+UDPGothic:wght@400;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #050a0f;
    --panel: #0a1520;
    --color-main: #00e5ff;
    --color-sec:  #ffb300;
    --color-date: #00e5ff;
    --color-week: #ffb300;
    --glow-main: rgba(0,229,255,0.4);
    --glow-sec:  rgba(255,179,0,0.5);
    --text-sub: rgba(0,229,255,0.5);
    --border: rgba(0,229,255,0.2);
  }

  html, body {
    height: 100%;
    background: var(--bg);
    font-family: 'BIZ UDGothic', 'BIZ UDPGothic', sans-serif;
    overflow: hidden;
    touch-action: manipulation;
  }

  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    min-height: 100dvh;
    padding: 48px 16px 24px;
    position: relative;
  }

  /* 背景グリッド */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(var(--border) 1px, transparent 1px),
      linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 40px 40px;
    opacity: 0.3;
    pointer-events: none;
    z-index: 0;
  }

  /* ビネット */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.85) 100%);
    pointer-events: none;
    z-index: 0;
  }

  .wrapper {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 400px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
  }

  /* 日付 */
  .date-section {
    width: 100%;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 14px 20px;
    text-align: center;
  }

  .date-display {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 2px;
    color: var(--color-date);
    text-shadow: 0 0 10px var(--glow-main);
  }

  .weekday {
    font-size: 14px;
    font-weight: 400;
    color: var(--color-week);
    letter-spacing: 4px;
    margin-top: 6px;
    text-shadow: 0 0 8px var(--glow-sec);
  }

  /* 時刻＋秒 横一列 */
  .time-row {
    width: 100%;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 20px 16px;
    display: flex;
    align-items: baseline;
    justify-content: center;
  }

  .time-main {
    font-size: clamp(60px, 17vw, 76px);
    font-weight: 700;
    line-height: 1;
    letter-spacing: 2px;
    color: var(--color-main);
    text-shadow: 0 0 20px var(--glow-main), 0 0 60px rgba(0,229,255,0.2);
    flex-shrink: 0;
  }

  .colon {
    animation: blink 1s step-start infinite;
  }

  @keyframes blink {
    0%, 49% { opacity: 1; }
    50%, 100% { opacity: 0.15; }
  }

  /* 秒（右側） */
  .sec-block {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-left: 10px;
    flex-shrink: 0;
  }

  .sec-label {
    font-size: 10px;
    font-weight: 400;
    letter-spacing: 3px;
    color: var(--text-sub);
    margin-bottom: 2px;
  }

  .sec-value {
    font-size: clamp(48px, 13vw, 58px);
    font-weight: 700;
    line-height: 1;
    color: var(--color-sec);
    text-shadow: 0 0 12px var(--glow-sec);
    letter-spacing: 1px;
  }

  /* ---- 色設定パネル ---- */
  .color-panel {
    width: 100%;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 14px 16px;
    display: none;
  }

  .color-panel.open {
    display: block;
  }

  .color-panel-title {
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--text-sub);
    margin-bottom: 12px;
    text-align: center;
  }

  .color-rows {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  .color-item {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .color-item label {
    font-size: 11px;
    color: rgba(0,229,255,0.6);
    letter-spacing: 1px;
    flex: 1;
    white-space: nowrap;
  }

  .color-item input[type="color"] {
    width: 36px;
    height: 28px;
    border: 1px solid var(--border);
    border-radius: 3px;
    background: transparent;
    cursor: pointer;
    padding: 2px;
    flex-shrink: 0;
  }
</style>
</head>
<body>
<div class="wrapper">
  <!-- 日付 -->
  <div class="date-section">
    <div class="date-display" id="dateDisplay">----/--/--</div>
    <div class="weekday" id="weekday">---</div>
  </div>

  <!-- 時刻＋秒 横一列 -->
  <div class="time-row">
    <div class="time-main">
      <span id="hh">--</span><span class="colon">:</span><span id="mm">--</span>
    </div>
    <div class="sec-block">
      <div class="sec-label">SEC</div>
      <div class="sec-value" id="ssDisplay">00</div>
    </div>
  </div>

  <!-- 色設定 -->
  <div class="color-panel">
    <div class="color-panel-title">COLOR SETTINGS</div>
    <div class="color-rows">
      <div class="color-item">
        <label>時刻</label>
        <input type="color" id="c-main" value="#00e5ff">
      </div>
      <div class="color-item">
        <label>秒</label>
        <input type="color" id="c-sec" value="#ffb300">
      </div>
      <div class="color-item">
        <label>日付</label>
        <input type="color" id="c-date" value="#00e5ff">
      </div>
      <div class="color-item">
        <label>曜日</label>
        <input type="color" id="c-week" value="#ffb300">
      </div>
    </div>
  </div>
</div>

<script>
const DAYS_JA = ['日','月','火','水','木','金','土'];
const pad = (n, w=2) => String(n).padStart(w, '0');
const root = document.documentElement;

function update() {
  const now = new Date();
  document.getElementById('dateDisplay').textContent = `${now.getFullYear()}/${pad(now.getMonth()+1)}/${pad(now.getDate())}`;
  document.getElementById('weekday').textContent     = `${DAYS_JA[now.getDay()]}曜日`;
  document.getElementById('hh').textContent          = pad(now.getHours());
  document.getElementById('mm').textContent          = pad(now.getMinutes());
  document.getElementById('ssDisplay').textContent   = pad(now.getSeconds());
}

update();
setInterval(update, 500);

// 色変更
function hexToRgba(hex, a) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}

document.getElementById('c-main').addEventListener('input', e => {
  root.style.setProperty('--color-main', e.target.value);
  root.style.setProperty('--glow-main', hexToRgba(e.target.value, 0.4));
});
document.getElementById('c-sec').addEventListener('input', e => {
  root.style.setProperty('--color-sec', e.target.value);
  root.style.setProperty('--glow-sec', hexToRgba(e.target.value, 0.5));
});
document.getElementById('c-date').addEventListener('input', e => {
  root.style.setProperty('--color-date', e.target.value);
});
document.getElementById('c-week').addEventListener('input', e => {
  root.style.setProperty('--color-week', e.target.value);
});

if ('wakeLock' in navigator) {
  navigator.wakeLock.request('screen').catch(() => {});
}

// 長押し（1秒）で色設定パネル開閉
const colorPanel = document.querySelector('.color-panel');
let holdTimer = null;

function startHold() {
  holdTimer = setTimeout(() => {
    colorPanel.classList.toggle('open');
    if (navigator.vibrate) navigator.vibrate(40);
  }, 1000);
}
function cancelHold() {
  clearTimeout(holdTimer);
}

document.addEventListener('touchstart', startHold, { passive: true });
document.addEventListener('touchend',   cancelHold);
document.addEventListener('touchmove',  cancelHold);
document.addEventListener('mousedown',  startHold);
document.addEventListener('mouseup',    cancelHold);
</script>
</body>
</html>
